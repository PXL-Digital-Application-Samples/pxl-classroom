name: PXL Classroom Lockdown
description: >-
  At the deadline, take a final snapshot of each student repo's submission ref,
  demote the student to pull (read-only), verify, and record the lockdown.

inputs:
  client-id:
    description: GitHub App Client ID
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Target organization (App must be installed here)
    required: true
  assignment-id:
    description: Assignment slug (matches assignments/<id>.yml)
    required: true
  data-dir:
    description: Root data directory containing assignments/, repositories/, observations/
    required: true

outputs:
  locked_count:
    description: Number of repos successfully locked down
    value: ${{ steps.run.outputs.locked_count }}
  error_count:
    description: Number of repos that failed
    value: ${{ steps.run.outputs.error_count }}
  uncertainty_seconds:
    description: Maximum uncertainty interval (lockdown_at - deadline_at) across all repos
    value: ${{ steps.run.outputs.uncertainty_seconds }}
  outcome:
    description: locked | partial | fail:*
    value: ${{ steps.run.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Mint App installation token for the target org
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Lockdown
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        ORG: ${{ inputs.org }}
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DATA_DIR: ${{ inputs.data-dir }}
      run: node "$GITHUB_ACTION_PATH/lockdown.mjs"
