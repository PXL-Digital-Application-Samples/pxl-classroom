# PXL Classroom — control repo: publish assignment.
#
# Creates a public broker repo for a published assignment. Sets broker repo
# variables (ASSIGNMENT_ID, CONTROL_ORG, CONTROL_REPO) and pushes the
# watch:started workflow.
#
# Supports dry-run mode.

name: Publish assignment

on:
  workflow_dispatch:
    inputs:
      assignment_id:
        description: "Assignment ID to publish"
        required: true
        type: string
      dry_run:
        description: "Dry run (validate only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout control repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Validate and publish
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.token.outputs.token }}
          GH_TOKEN: ${{ steps.token.outputs.token }}
          ASSIGNMENT_ID: ${{ inputs.assignment_id }}
          ORG: ${{ github.repository_owner }}
          CONTROL_REPO: ${{ github.event.repository.name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: node "${{ github.workspace }}/publish.mjs" || true

      # If the shared codebase has publish.mjs, use it. Otherwise inline:
      - name: Publish broker (inline)
        if: inputs.dry_run != true
        shell: bash
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          ASSIGNMENT_ID="${{ inputs.assignment_id }}"
          ORG="${{ github.repository_owner }}"
          CONTROL_REPO="${{ github.event.repository.name }}"
          BROKER_REPO="broker-${ASSIGNMENT_ID}"

          # Validate assignment file exists and is draft or published
          if [ ! -f "assignments/${ASSIGNMENT_ID}.yml" ]; then
            echo "::error::Assignment file not found: assignments/${ASSIGNMENT_ID}.yml"
            exit 1
          fi

          # Check if broker repo already exists
          if gh repo view "${ORG}/${BROKER_REPO}" --json name > /dev/null 2>&1; then
            echo "Broker repo ${ORG}/${BROKER_REPO} already exists — skipping creation"
          else
            # Create public broker repo
            gh repo create "${ORG}/${BROKER_REPO}" \
              --public \
              --description "Assignment acceptance broker for ${ASSIGNMENT_ID}" \
              --disable-wiki \
              --disable-issues
            echo "Created broker repo ${ORG}/${BROKER_REPO}"
          fi

          # Set repo variables
          gh variable set ASSIGNMENT_ID --body "${ASSIGNMENT_ID}" --repo "${ORG}/${BROKER_REPO}"
          gh variable set CONTROL_ORG --body "${ORG}" --repo "${ORG}/${BROKER_REPO}"
          gh variable set CONTROL_REPO --body "${CONTROL_REPO}" --repo "${ORG}/${BROKER_REPO}"

          # Push the broker workflow
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          git init
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${BROKER_REPO}.git"
          mkdir -p .github/workflows

          # Copy broker workflow template from shared codebase
          # (The workflow is in the pxl-classroom shared repo)
          cat > .github/workflows/acceptance-trigger.yml << 'WORKFLOW_EOF'
          ${{ '' }}
          WORKFLOW_EOF

          # For now, write the broker workflow inline
          cat > .github/workflows/acceptance-trigger.yml << 'EOF'
          name: Acceptance trigger
          on:
            watch:
              types: [started]
          permissions:
            contents: read
          concurrency:
            group: accept-${{ github.actor }}
            cancel-in-progress: false
          jobs:
            dispatch:
              runs-on: ubuntu-latest
              if: github.event.action == 'started'
              steps:
                - name: Validate actor
                  id: validate
                  shell: bash
                  run: |
                    echo "actor=${{ github.actor }}" >> "$GITHUB_OUTPUT"
                    echo "actor_id=${{ github.event.sender.id }}" >> "$GITHUB_OUTPUT"
                - name: Mint dispatcher token
                  id: token
                  uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
                  with:
                    app-id: ${{ secrets.DISPATCH_APP_ID }}
                    private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
                    owner: ${{ vars.CONTROL_ORG }}
                - name: Dispatch to control repo
                  shell: bash
                  env:
                    GH_TOKEN: ${{ steps.token.outputs.token }}
                  run: |
                    gh api --method POST \
                      "/repos/${{ vars.CONTROL_ORG }}/${{ vars.CONTROL_REPO }}/dispatches" \
                      -f "event_type=acceptance" \
                      -f "client_payload[assignment_id]=${{ vars.ASSIGNMENT_ID }}" \
                      -f "client_payload[github_login]=${{ steps.validate.outputs.actor }}" \
                      -f "client_payload[github_id]=${{ steps.validate.outputs.actor_id }}" \
                      -f "client_payload[workflow_run_url]=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          EOF

          # Create a README
          cat > README.md << READMEEOF
          # ${ASSIGNMENT_ID}

          Assignment acceptance broker. Star this repo to accept the assignment.

          > This is an automated repository managed by PXL Classroom.
          READMEEOF

          git add -A
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git commit -m "Initialize broker for ${ASSIGNMENT_ID}"
          git branch -M main
          git push -u origin main --force

          echo "### ✅ Published assignment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| field | value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| assignment | ${ASSIGNMENT_ID} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| broker | ${ORG}/${BROKER_REPO} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update assignment state
        if: inputs.dry_run != true
        shell: bash
        run: |
          ASSIGNMENT_ID="${{ inputs.assignment_id }}"
          FILE="assignments/${ASSIGNMENT_ID}.yml"

          # Update state to published (sed for YAML)
          sed -i "s/^state:.*/state: published/" "$FILE"

          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add "$FILE"
          git diff --cached --quiet || git commit -m "Publish assignment ${ASSIGNMENT_ID}"
          git push
