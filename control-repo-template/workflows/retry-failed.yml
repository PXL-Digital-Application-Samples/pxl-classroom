# PXL Classroom — control repo: retry failed provisioning.
#
# Scans acceptance records for failed/pending entries and retries provisioning.

name: Retry failed provisioning

on:
  workflow_dispatch:
    inputs:
      assignment_id:
        description: "Assignment ID (blank = all)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Find failed acceptances
        id: find
        shell: bash
        run: |
          FAILED=()
          PATTERN="${{ inputs.assignment_id || '*' }}"

          for f in acceptances/${PATTERN}/*.json; do
            [ -f "$f" ] || continue
            STATUS=$(node -e "const d=JSON.parse(require('fs').readFileSync('$f','utf-8'));console.log(d.status)")
            if [ "$STATUS" = "accepted" ] || [ "$STATUS" = "failed" ]; then
              FAILED+=("$f")
            fi
          done

          echo "count=${#FAILED[@]}" >> "$GITHUB_OUTPUT"
          echo "Found ${#FAILED[@]} failed/pending acceptance(s)"

          # Write list for matrix
          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "files=$(printf '%s\n' "${FAILED[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
          else
            echo "files=[]" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: steps.find.outputs.count == '0'
        run: echo "No failed acceptances to retry." >> "$GITHUB_STEP_SUMMARY"

  # Matrix retry (one job per failed acceptance)
  reprovision:
    needs: retry
    if: needs.retry.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        file: ${{ fromJSON(needs.retry.outputs.files || '[]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Parse acceptance
        id: parse
        shell: bash
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('${{ matrix.file }}', 'utf-8'));
            const fs = require('fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'assignment_id=' + d.assignment_id + '\n');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'github_login=' + d.github_login + '\n');
          "

      - name: Load assignment
        id: assignment
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const text = fs.readFileSync('assignments/${{ steps.parse.outputs.assignment_id }}.yml', 'utf-8');
            const match = text.match(/repository_name_pattern:\s*(.+)/);
            const pattern = match ? match[1].trim() : '${{ steps.parse.outputs.assignment_id }}-{github_login}';
            const repoName = pattern.replace('{github_login}', '${{ steps.parse.outputs.github_login }}');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'target_repo=' + repoName + '\n');

            const tmatch = text.match(/template:\\s*\\n\\s*owner:\\s*(\\S+)\\s*\\n\\s*repository:\\s*(\\S+)/);
            if (tmatch) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'template_owner=' + tmatch[1] + '\n');
              fs.appendFileSync(process.env.GITHUB_OUTPUT, 'template_repo=' + tmatch[2] + '\n');
            }
          "

      - name: Reprovision
        uses: PXL-Digital-Application-Samples/pxl-classroom/provisioning@main
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ github.repository_owner }}
          template-owner: ${{ steps.assignment.outputs.template_owner || github.repository_owner }}
          template-repo: ${{ steps.assignment.outputs.template_repo }}
          target-repo: ${{ steps.assignment.outputs.target_repo }}
          student-login: ${{ steps.parse.outputs.github_login }}
