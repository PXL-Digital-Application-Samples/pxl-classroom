# PXL Classroom — control repo: regenerate dashboard data.
#
# Generates public assignment metadata JSON and runs the privacy scanner.
# Also regenerates the private dashboard aggregate.

name: Regenerate dashboard

on:
  workflow_dispatch:
  # Auto-trigger after data changes
  push:
    paths:
      - "reports/**"
      - "assignments/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate and scan
        uses: PXL-Digital-Application-Samples/pxl-classroom/pages@main
        with:
          data-dir: "."
          output-dir: "public"

      - name: Commit public data
        shell: bash
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet || git commit -m "Regenerate dashboard data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
