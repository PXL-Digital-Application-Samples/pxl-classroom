# PXL Classroom — control repo: finalize deadline.
#
# At the assignment deadline, this workflow:
#   1. Takes a final snapshot of all managed repos
#   2. Locks down students (admin → read)
#   3. Preserves the candidate submission SHA
#   4. Generates the deadline report
#
# Trigger: scheduled (at deadline) + manual

name: Finalize deadline

on:
  workflow_dispatch:
    inputs:
      assignment_id:
        description: "Assignment ID to finalize"
        required: true
        type: string
      dry_run:
        description: "Dry run (no lock-down, no commit)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: finalize-${{ inputs.assignment_id || 'all' }}
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Final snapshot
        uses: PXL-Digital-Application-Samples/pxl-classroom/collect@main
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ github.repository_owner }}
          assignment-id: ${{ inputs.assignment_id }}
          collection-type: deadline

      - name: Lock down students
        if: inputs.dry_run != true
        uses: PXL-Digital-Application-Samples/pxl-classroom/lockdown@main
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ github.repository_owner }}
          assignment-id: ${{ inputs.assignment_id }}

      - name: Generate report
        uses: PXL-Digital-Application-Samples/pxl-classroom/report@main
        with:
          assignment-id: ${{ inputs.assignment_id }}

      - name: Commit results
        if: inputs.dry_run != true
        shell: bash
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add observations/ reports/
          git diff --cached --quiet || git commit -m "Finalize deadline for ${{ inputs.assignment_id }} [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
