name: Reconcile Registry

on:
  workflow_dispatch:
    inputs:
      assignment_id:
        description: "Assignment ID to reconcile (leave blank for all)"
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Registry Reconciliation
        id: registry
        uses: PXL-Digital-Application-Samples/pxl-classroom/registry@main
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ github.repository_owner }}
          assignment-id: ${{ inputs.assignment_id || '' }}

      - name: Notify on Drift
        if: steps.registry.outputs.drift-detected == 'true'
        uses: PXL-Digital-Application-Samples/pxl-classroom/notify@main
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ github.repository_owner }}
          control-repo: ${{ github.event.repository.name }}
          event-type: "unexpected-deletion"
          assignment-id: ${{ inputs.assignment_id || 'all' }}
          details: "The registry reconciliation job detected drift (e.g., deleted repositories or revoked access) and updated the `repositories/` records. Please check the commit history for details."
          dedup-key: "reconcile-${{ inputs.assignment_id || 'all' }}"

      - name: Commit state updates
        if: steps.registry.outputs.drift-detected == 'true'
        shell: bash
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add repositories/
          git diff --cached --quiet || git commit -m "chore: reconcile registry state [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git pull --rebase
          git push
