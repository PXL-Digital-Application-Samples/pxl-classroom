name: PXL Classroom Provision
description: >-
  Create a private organization repository from a private template and grant a
  student a role (idempotent), authenticated as a per-organization GitHub App.

inputs:
  client-id:
    description: GitHub App Client ID
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Target organization (App must be installed here)
    required: true
  template-owner:
    description: Template repository owner
    required: true
  template-repo:
    description: Template repository name (must be a template)
    required: true
  target-repo:
    description: Repository name to create
    required: true
  student-login:
    description: Student GitHub login to grant access
    required: true
  student-permission:
    description: pull | triage | push | maintain | admin
    required: false
    default: admin
  repo-private:
    description: Create the repository private
    required: false
    default: "true"

outputs:
  repo-id:
    description: Immutable GitHub repository ID
    value: ${{ steps.run.outputs.repo_id }}
  repo-url:
    description: Repository HTML URL
    value: ${{ steps.run.outputs.repo_url }}
  repo-name:
    description: Full name (org/repo)
    value: ${{ steps.run.outputs.repo_name }}
  outcome:
    description: created | reused | dry-run:ok | fail:*
    value: ${{ steps.run.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Mint App installation token for the target org
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Provision
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        ORG: ${{ inputs.org }}
        TEMPLATE_OWNER: ${{ inputs.template-owner }}
        TEMPLATE_REPO: ${{ inputs.template-repo }}
        TARGET_REPO: ${{ inputs.target-repo }}
        STUDENT_LOGIN: ${{ inputs.student-login }}
        STUDENT_PERMISSION: ${{ inputs.student-permission }}
        PRIVATE: ${{ inputs.repo-private }}
      run: node "$GITHUB_ACTION_PATH/provision.mjs"
