name: PXL Classroom Collect
description: >-
  Snapshot the submission ref for every managed repository in an assignment.
  Records observations as timestamped JSON files in the data directory.

inputs:
  app-id:
    description: GitHub App ID
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Target organization (App must be installed here)
    required: true
  assignment-id:
    description: Assignment slug (matches assignments/<id>.yml)
    required: true
  data-dir:
    description: Root data directory containing assignments/, repositories/, observations/
    required: true

outputs:
  collected_count:
    description: Number of repos successfully snapshotted
    value: ${{ steps.run.outputs.collected_count }}
  error_count:
    description: Number of repos that failed
    value: ${{ steps.run.outputs.error_count }}
  outcome:
    description: collected | partial | fail:*
    value: ${{ steps.run.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Mint App installation token for the target org
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "20"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Collect snapshots
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        ORG: ${{ inputs.org }}
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DATA_DIR: ${{ inputs.data-dir }}
      run: node "$GITHUB_ACTION_PATH/collect.mjs"
