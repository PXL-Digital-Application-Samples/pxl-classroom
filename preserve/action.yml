name: PXL Classroom Preserve
description: >-
  Preserve a candidate SHA for all students in an assignment by pushing it to an
  instructor-controlled archive repo, then verify the hash via ls-remote.

inputs:
  client-id:
    description: GitHub App Client ID
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Target organization (App must be installed here)
    required: true
  assignment-id:
    description: Assignment slug
    required: true
  data-dir:
    description: Root data directory containing observations/ and lockdowns/
    required: true

outputs:
  preserved_count:
    description: Number of students preserved
    value: ${{ steps.run.outputs.preserved_count }}
  error_count:
    description: Number of errors during preservation
    value: ${{ steps.run.outputs.error_count }}
  outcome:
    description: preserved | partial | fail:*
    value: ${{ steps.run.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Mint App installation token for the target org
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Preserve submissions
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        ORG: ${{ inputs.org }}
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DATA_DIR: ${{ inputs.data-dir }}
      run: node "$GITHUB_ACTION_PATH/preserve.mjs"
