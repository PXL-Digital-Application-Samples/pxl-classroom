name: PXL Classroom Report Generator
description: >-
  Compute a deadline report and optional CSV/JSON export for an assignment.
  Reads observations, acceptances, repository records, and overrides to
  produce a per-student submission status report.

inputs:
  assignment-id:
    description: Assignment ID to generate report for
    required: true
  data-dir:
    description: Root of the control-repo data tree
    required: false
    default: "."
  output-format:
    description: "json | csv | both"
    required: false
    default: "both"

outputs:
  student-count:
    description: Number of students in the report
    value: ${{ steps.report.outputs.student_count }}
  on-time-count:
    description: Number of on-time submissions
    value: ${{ steps.report.outputs.on_time_count }}
  late-count:
    description: Number of late submissions
    value: ${{ steps.report.outputs.late_count }}
  outcome:
    description: generated | fail:*
    value: ${{ steps.report.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "20"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Generate report
      id: report
      shell: bash
      env:
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DATA_DIR: ${{ inputs.data-dir }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
      run: node "$GITHUB_ACTION_PATH/report.mjs"
