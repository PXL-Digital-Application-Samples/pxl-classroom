name: PXL Classroom Notify
description: >-
  Post or update an instructor tracking issue in the control repo with
  significant events. Deduplicates repeated alerts for the same condition.

inputs:
  client-id:
    description: GitHub App Client ID
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Organization
    required: true
  control-repo:
    description: Control repository name
    required: true
  event-type:
    description: >
      Event type: provisioning-failed | collection-failed | deadline-gap |
      missing-access | unexpected-deletion | late-activity | preservation-failed
    required: true
  assignment-id:
    description: Assignment ID
    required: true
  details:
    description: Human-readable details (markdown)
    required: true
  dedup-key:
    description: Deduplication key (same key = update existing comment instead of new)
    required: false
    default: ""

outputs:
  outcome:
    description: notified | deduplicated | fail:*
    value: ${{ steps.notify.outputs.outcome }}

runs:
  using: composite
  steps:
    - name: Mint App token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "20"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Post notification
      id: notify
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        ORG: ${{ inputs.org }}
        CONTROL_REPO: ${{ inputs.control-repo }}
        EVENT_TYPE: ${{ inputs.event-type }}
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DETAILS: ${{ inputs.details }}
        DEDUP_KEY: ${{ inputs.dedup-key }}
      run: node "$GITHUB_ACTION_PATH/notify.mjs"
