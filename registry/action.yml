name: PXL Classroom Registry Reconcile
description: >-
  Scans all provisioned repositories to detect drift (e.g., student deleted the repo, 
  visibility changed to public, or access was revoked). Updates the registry state.

inputs:
  client-id:
    description: "GitHub App Client ID"
    required: true
  app-private-key:
    description: "GitHub App Private Key"
    required: true
  org:
    description: "Organization name"
    required: true
  assignment-id:
    description: "Optional assignment ID to limit the scope. Defaults to all."
    required: false
  data-dir:
    description: "Root of the control-repo data tree"
    required: false
    default: "."

outputs:
  drift-detected:
    description: "true if any anomalies were found, false otherwise"
    value: ${{ steps.reconcile.outputs.drift_detected }}

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Mint App token
      id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.app-private-key }}
        owner: ${{ inputs.org }}

    - name: Run reconciliation
      id: reconcile
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.token.outputs.token }}
        GITHUB_ORG: ${{ inputs.org }}
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        DATA_DIR: ${{ inputs.data-dir }}
      run: node "$GITHUB_ACTION_PATH/reconcile.mjs"
