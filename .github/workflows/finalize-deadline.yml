name: Finalize deadline
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      org:
        required: true
        type: string
      assignment_id:
        required: true
        type: string
      dry_run:
        type: boolean
        default: false
jobs:
  find-orgs:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      orgs: ${{ steps.list.outputs.orgs }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: list
        run: |
          git fetch origin participating-orgs:participating-orgs || true
          if git show participating-orgs:participating-orgs.yml > participating-orgs.yml 2>/dev/null; then
            ORGS=$(node -e "
              const {parse} = require('yaml');
              const fs=require('fs');
              const o = parse(fs.readFileSync('participating-orgs.yml','utf8'));
              process.stdout.write(JSON.stringify(o.orgs.map(x => x.login)||[]));
            ")
            echo "orgs=$ORGS" >> "$GITHUB_OUTPUT"
          else
            echo "orgs=[]" >> "$GITHUB_OUTPUT"
          fi

  setup:
    needs: find-orgs
    if: github.event_name == 'schedule' && needs.find-orgs.outputs.orgs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control
      - id: find
        run: |
          node scripts/find-finalizable.mjs control ${{ matrix.org }} > finalizable-${{ matrix.org }}.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: finalizable-${{ matrix.org }}
          path: finalizable-${{ matrix.org }}.json

  aggregate:
    needs: setup
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    outputs:
      finalizable: ${{ steps.agg.outputs.finalizable }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.9
        with:
          pattern: finalizable-*
          merge-multiple: true
      - id: agg
        run: |
          cat *.json | jq -s 'flatten' -c > all-finalizable.json
          echo "finalizable=$(cat all-finalizable.json)" >> "$GITHUB_OUTPUT"

  finalize:
    needs: aggregate
    if: always() && (github.event_name == 'workflow_dispatch' || (needs.aggregate.outputs.finalizable != '[]' && needs.aggregate.outputs.finalizable != ''))
    strategy:
      matrix:
        assignment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('[{{"org":"{0}","assignment_id":"{1}"}}]', inputs.org, inputs.assignment_id)) || fromJSON(needs.aggregate.outputs.finalizable) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: finalize-${{ matrix.assignment.org }}-${{ matrix.assignment.assignment_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: npm ci --omit=dev
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.assignment.org }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ matrix.assignment.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control

      - name: 1. Collect
        uses: ./collect
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment_id: ${{ matrix.assignment.assignment_id }}
          data-dir: control
          collection_type: deadline

      - name: 2. Lockdown
        if: ${{ !inputs.dry_run }}
        uses: ./lockdown
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment_id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: 3. Preserve
        if: ${{ !inputs.dry_run }}
        id: preserve_step
        uses: ./preserve
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment_id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: Notify on Preservation Failure
        if: ${{ !inputs.dry_run && (failure() || steps.preserve_step.outputs.outcome == 'fail:exception') }}
        uses: ./notify
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          control-repo: pxl-classroom-control
          event-type: preservation-failed
          assignment-id: ${{ matrix.assignment.assignment_id }}
          details: |
            Preservation failed.
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          dedup-key: preserve-fail-${{ matrix.assignment.assignment_id }}

      - name: 4. Report
        if: always()
        uses: ./report
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment-id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: Commit + push
        if: ${{ !inputs.dry_run }}
        working-directory: control
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add observations/ lockdowns/ reports/ || true
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "Finalize deadline for ${{ matrix.assignment.assignment_id }}"
          MAX_RETRIES=5
          RETRY_COUNT=0
          git pull --rebase || true
          until git push; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then exit 1; fi
            sleep $(( (RANDOM % 5) + 2 ))
            git pull --rebase
          done
