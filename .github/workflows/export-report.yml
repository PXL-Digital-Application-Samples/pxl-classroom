name: Export report
on:
  workflow_dispatch:
    inputs:
      org:
        description: "Organization"
        required: true
        type: string
      assignment_id:
        description: "Assignment ID"
        required: true
        type: string
      format:
        description: "json | csv | both"
        required: false
        type: string
        default: "both"

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ inputs.org }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ inputs.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control

      - name: Generate report
        uses: ./report
        with:
          assignment-id: ${{ inputs.assignment_id }}
          data-dir: control
          output-format: ${{ inputs.format }}

      - name: Commit report
        working-directory: control
        shell: bash
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "Export report for ${{ inputs.assignment_id }} [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          git pull --rebase || true
          until git push; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then exit 1; fi
            sleep $(( (RANDOM % 5) + 2 ))
            git pull --rebase
          done

      - name: Upload export
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: report-${{ inputs.assignment_id }}
          path: |
            control/reports/${{ inputs.assignment_id }}.json
            control/reports/${{ inputs.assignment_id }}.csv
