name: Setup Organization

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: 'Target Organization (e.g., PXLAutomation)'
        required: true
        type: string
      budget_owner_login:
        description: 'GitHub login of the budget owner (receives weekly usage warnings via @-mention)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  setup-control-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main codebase
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate App token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ inputs.target_org }}

      - name: Create pxl-classroom-control repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const org = context.payload.inputs.target_org;
            const repoName = 'pxl-classroom-control';
            
            console.log(`Checking if ${org}/${repoName} already exists...`);
            try {
              await github.rest.repos.get({ owner: org, repo: repoName });
              console.log('Repository already exists. Proceeding to update files.');
            } catch (error) {
              if (error.status === 404) {
                console.log(`Creating repository ${org}/${repoName}...`);
                await github.rest.repos.createInOrg({
                  org: org,
                  name: repoName,
                  private: true,
                  auto_init: false,
                  description: 'PXL Classroom Control Repository'
                });
                await new Promise(r => setTimeout(r, 5000));
              } else {
                throw error;
              }
            }

            console.log('Setting Actions access to allow reusable workflows from other org repos...');
            try {
              await github.request('PUT /repos/{owner}/{repo}/actions/permissions/access', {
                owner: org,
                repo: repoName,
                access_level: 'organization'
              });
            } catch (error) {
              console.log('Failed to set Actions access level:', error.message);
            }

      - name: Initialize control repo structure
        run: |
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          git init
          git config user.name "pxl-classroom-provisioner[bot]"
          git config user.email "pxl-classroom-provisioner[bot]@users.noreply.github.com"
          
          mkdir -p assignments acceptances repositories observations lockdowns reports public
          touch assignments/.gitkeep acceptances/.gitkeep repositories/.gitkeep observations/.gitkeep lockdowns/.gitkeep reports/.gitkeep public/.gitkeep
          
          cat > README.md << 'EOF'
          # PXL Classroom Control Repo
          This is an automated data repository for PXL Classroom. Do not modify these files manually unless you know what you are doing.
          EOF
          
          git add .
          git commit -m "Initialize control repo structure"
          git branch -M main
          git remote add origin https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ inputs.target_org }}/pxl-classroom-control.git
          
          git pull --rebase origin main || true

          # Wave 2 architecture: control repos are data-only. If a legacy
          # control repo had workflows pushed before the centralization, strip
          # them now. (See PXLAutomation/pxl-classroom-control cleanup,
          # 2026-06-17, for the reference incident.)
          if [ -d .github/workflows ] || [ -d workflows ]; then
            rm -rf .github/workflows workflows
            git add -A
            git diff --cached --quiet || git commit -m "Remove workflows (control repo is data-only per Wave 2)"
          fi

          git push -u origin main

      - name: Register org in participating-orgs branch
        env:
          TARGET_ORG: ${{ inputs.target_org }}
          BUDGET_OWNER_LOGIN: ${{ inputs.budget_owner_login }}
        run: |
          for v in "$TARGET_ORG" "$BUDGET_OWNER_LOGIN"; do
            if ! printf '%s' "$v" | grep -Eq '^[A-Za-z0-9](-?[A-Za-z0-9]){0,38}$'; then
              echo "::error::'$v' is not a valid GitHub login."
              exit 1
            fi
          done

          git fetch origin participating-orgs:participating-orgs || true
          git checkout participating-orgs || git checkout --orphan participating-orgs

          # Normalise any pre-existing UTF-16 / BOM file to plain UTF-8 LF.
          if [ -f participating-orgs.yml ]; then
            head -c 3 participating-orgs.yml | od -An -tx1 | tr -d ' \n' > .porgs-magic
            MAGIC=$(cat .porgs-magic); rm -f .porgs-magic
            case "$MAGIC" in
              fffe*) iconv -f UTF-16LE -t UTF-8 participating-orgs.yml > participating-orgs.yml.new && mv participating-orgs.yml.new participating-orgs.yml ;;
              feff*) iconv -f UTF-16BE -t UTF-8 participating-orgs.yml > participating-orgs.yml.new && mv participating-orgs.yml.new participating-orgs.yml ;;
              efbbbf) tail -c +4 participating-orgs.yml > participating-orgs.yml.new && mv participating-orgs.yml.new participating-orgs.yml ;;
            esac
            # Strip CRs that may remain from a Windows source.
            tr -d '\r' < participating-orgs.yml > participating-orgs.yml.new && mv participating-orgs.yml.new participating-orgs.yml
          fi

          if [ ! -f participating-orgs.yml ]; then
            printf 'schema_version: 1\norgs:\n' > participating-orgs.yml
          elif ! grep -q '^schema_version:' participating-orgs.yml; then
            { printf 'schema_version: 1\n'; cat participating-orgs.yml; } > participating-orgs.yml.new
            mv participating-orgs.yml.new participating-orgs.yml
          fi

          if ! grep -Eq "^[[:space:]]*-[[:space:]]+login:[[:space:]]+${TARGET_ORG}[[:space:]]*$" participating-orgs.yml; then
            printf '  - login: %s\n    budget_owner_login: %s\n' "$TARGET_ORG" "$BUDGET_OWNER_LOGIN" >> participating-orgs.yml
            git config user.name "pxl-classroom-provisioner[bot]"
            git config user.email "pxl-classroom-provisioner[bot]@users.noreply.github.com"
            git add participating-orgs.yml
            git commit -m "Register ${TARGET_ORG} in participating-orgs"
            git push origin participating-orgs
          else
            echo "${TARGET_ORG} is already registered."
          fi
