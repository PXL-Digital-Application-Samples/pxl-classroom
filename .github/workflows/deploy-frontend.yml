name: Deploy frontend to Pages

on:
  push:
    branches: ["main"]
    paths:
      - 'frontend/**'
      - 'lib/**'
      - 'schemas/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # The SPA imports lib/*.mjs from the repo root; those modules resolve
      # their packages (yaml) from the root node_modules.
      - name: Install root dependencies
        run: npm ci --omit=dev

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Copy schemas
        run: |
          mkdir -p frontend/public/schemas
          cp schemas/*.schema.json frontend/public/schemas/

      - name: Fetch participating orgs definition
        run: |
          git fetch origin participating-orgs:participating-orgs || true
          git show participating-orgs:participating-orgs.yml > participating-orgs.yml || true

      - name: Fetch public pages data from org control repos
        run: node scripts/fetch-pages-data.mjs
        env:
          PXL_APP_CLIENT_ID: ${{ secrets.PXL_APP_CLIENT_ID }}
          PXL_APP_PRIVATE_KEY: ${{ secrets.PXL_APP_PRIVATE_KEY }}

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          VITE_GITHUB_CLIENT_ID: ${{ secrets.VITE_GITHUB_CLIENT_ID }}
          VITE_CORS_PROXY_URL: ${{ secrets.VITE_CORS_PROXY_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './frontend/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
