name: Daily Activity & Deadline Check
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      org: { type: string }

permissions:
  contents: read
jobs:
  find-orgs:
    uses: ./.github/workflows/_find-orgs.reusable.yml
    with:
      org: ${{ inputs.org }}

  disable-when-empty:
    needs: find-orgs
    if: needs.find-orgs.outputs.orgs == '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Disable daily-activity (no participating orgs)
        run: |
          echo "No participating orgs registered. Disabling daily-activity.yml until next publish."
          gh workflow disable daily-activity.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  collect:
    needs: find-orgs
    if: needs.find-orgs.outputs.orgs != '[]'
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: collect-${{ matrix.org }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci --omit=dev
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control
      - uses: ./collect
        id: collect_action
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.org }}
          assignment-id: ''
          collection-type: scheduled
          data-dir: control

      - name: Commit + push to control repo
        if: always()
        run: |
          set -e
          git -C control config user.name "pxl-classroom[bot]"
          git -C control config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git -C control add observations/
          if git -C control diff --cached --quiet; then exit 0; fi
          git -C control commit -m "Collect activity"
          scripts/git-push-with-retry.sh control

  find-finalizable:
    needs: collect
    if: always() && needs.find-orgs.outputs.orgs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control
      - id: find
        run: |
          node scripts/find-finalizable.mjs control ${{ matrix.org }} > finalizable-${{ matrix.org }}.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: finalizable-${{ matrix.org }}
          path: finalizable-${{ matrix.org }}.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.0
        with:
          name: active-${{ matrix.org }}
          path: active-${{ matrix.org }}.json

  aggregate-finalizable:
    needs: find-finalizable
    runs-on: ubuntu-latest
    outputs:
      finalizable: ${{ steps.agg.outputs.finalizable }}
      active_count: ${{ steps.agg.outputs.active_count }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.9
        with:
          pattern: finalizable-*
          merge-multiple: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.9
        with:
          pattern: active-*
          merge-multiple: true
      - id: agg
        run: |
          cat finalizable-*.json | jq -s 'flatten' -c > all-finalizable.json
          echo "finalizable=$(cat all-finalizable.json)" >> "$GITHUB_OUTPUT"
          
          # Sum the active counts
          TOTAL_ACTIVE=0
          for f in active-*.json; do
            count=$(jq '.active' < "$f")
            TOTAL_ACTIVE=$((TOTAL_ACTIVE + count))
          done
          echo "active_count=$TOTAL_ACTIVE" >> "$GITHUB_OUTPUT"

  finalize:
    needs: aggregate-finalizable
    if: needs.aggregate-finalizable.outputs.finalizable != '[]' && needs.aggregate-finalizable.outputs.finalizable != ''
    strategy:
      matrix:
        assignment: ${{ fromJSON(needs.aggregate-finalizable.outputs.finalizable) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: finalize-${{ matrix.assignment.org }}-${{ matrix.assignment.assignment_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci --omit=dev
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.assignment.org }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.assignment.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control

      - name: 1. Collect
        uses: ./collect
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment-id: ${{ matrix.assignment.assignment_id }}
          data-dir: control
          collection-type: deadline

      - name: 2. Lockdown
        uses: ./lockdown
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment-id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: 3. Preserve
        id: preserve_step
        uses: ./preserve
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment-id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: 4. Report
        if: always()
        uses: ./report
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.assignment.org }}
          assignment-id: ${{ matrix.assignment.assignment_id }}
          data-dir: control

      - name: Commit + push
        run: |
          set -e
          git -C control config user.name "pxl-classroom[bot]"
          git -C control config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git -C control add observations/ lockdowns/ reports/ || true
          if git -C control diff --cached --quiet; then exit 0; fi
          git -C control commit -m "Finalize deadline for ${{ matrix.assignment.assignment_id }}"
          scripts/git-push-with-retry.sh control

  check-idle:
    needs: [aggregate-finalizable, finalize]
    if: always() && needs.aggregate-finalizable.outputs.active_count == '0'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Disable Daily Activity Workflow
        run: |
          echo "No active assignments remain. Disabling daily-activity.yml to save minutes."
          gh workflow disable daily-activity.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          
  trigger-dashboard:
    needs: [aggregate-finalizable, finalize]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'regenerate-dashboard.yml', ref: 'main'
            });
