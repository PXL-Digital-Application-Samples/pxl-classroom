name: Reconcile Registry
on:
  push:
    branches:
      - participating-orgs
    paths:
      - 'participating-orgs.yml'
  workflow_dispatch:
    inputs:
      org: { type: string }
      assignment_id: { type: string }
jobs:
  find-orgs:
    runs-on: ubuntu-latest
    outputs:
      orgs: ${{ steps.list.outputs.orgs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: list
        run: |
          if [ -n "${{ inputs.org }}" ]; then
            echo "orgs=[\"${{ inputs.org }}\"]" >> "$GITHUB_OUTPUT"
          else
            git fetch origin participating-orgs:participating-orgs || true
            if git show participating-orgs:participating-orgs.yml > participating-orgs.yml 2>/dev/null; then
              ORGS=$(node scripts/get-participating-orgs.mjs)
              echo "orgs=$ORGS" >> "$GITHUB_OUTPUT"
            else
              echo "orgs=[]" >> "$GITHUB_OUTPUT"
            fi
          fi

  reconcile:
    needs: find-orgs
    if: needs.find-orgs.outputs.orgs != '[]'
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: reconcile-${{ matrix.org }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci --omit=dev
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control
      - uses: ./registry
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.org }}
          assignment-id: ${{ inputs.assignment_id || '' }}
          data-dir: control
      - name: Commit + push to control repo
        run: |
          set -e
          git -C control config user.name "pxl-classroom[bot]"
          git -C control config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git -C control add repositories/
          if git -C control diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git -C control commit -m "Reconcile registry"
          scripts/git-push-with-retry.sh control
