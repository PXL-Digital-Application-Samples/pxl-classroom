name: Regenerate Dashboard Data
on:
  workflow_dispatch:
    inputs:
      org: { type: string }

permissions:
  contents: read
jobs:
  find-orgs:
    uses: ./.github/workflows/_find-orgs.reusable.yml
    with:
      org: ${{ inputs.org }}

  generate:
    needs: find-orgs
    if: needs.find-orgs.outputs.orgs != '[]'
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: dashboard-${{ matrix.org }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci --omit=dev
      - name: Mint App token
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control

      - name: Generate and scan
        uses: ./pages
        with:
          data-dir: "control"
          output-dir: "control/public"

      - name: Commit public data
        shell: bash
        run: |
          set -e
          git -C control config user.name "pxl-classroom[bot]"
          git -C control config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git -C control add public/
          if git -C control diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git -C control commit -m "Regenerate dashboard data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          scripts/git-push-with-retry.sh control

  deploy-pages:
    needs: [find-orgs, generate]
    if: always() && needs.find-orgs.outputs.orgs != '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Trigger frontend and data deployment
        run: |
          gh workflow run deploy-frontend.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
