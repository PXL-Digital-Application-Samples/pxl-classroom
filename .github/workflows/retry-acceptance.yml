name: Retry Acceptance

# Lecturer-triggerable rescue for half-done acceptances.
# Wipes the per-student acceptance file in the control repo, then re-runs the
# full acceptance + provisioning sequence under the same concurrency group as
# the normal acceptance-handler.

on:
  workflow_dispatch:
    inputs:
      org:
        description: Target organization
        required: true
        type: string
      assignment_id:
        description: Assignment ID (slug)
        required: true
        type: string
      github_login:
        description: Student GitHub login
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: accept-${{ inputs.org }}-${{ inputs.assignment_id }}-${{ inputs.github_login }}
  cancel-in-progress: false

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: npm ci --omit=dev

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ inputs.org }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control

      - name: Look up student GitHub numeric ID
        id: lookup
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          ID=$(gh api users/${{ inputs.github_login }} --jq .id)
          if [ -z "$ID" ]; then
            echo "::error::Could not resolve GitHub ID for ${{ inputs.github_login }}"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Wipe half-done acceptance state
        working-directory: control
        run: |
          ACCEPT_FILE="acceptances/${{ inputs.assignment_id }}/${{ inputs.github_login }}.json"
          if [ -f "$ACCEPT_FILE" ]; then
            rm -f "$ACCEPT_FILE"
            git config user.name "pxl-classroom[bot]"
            git config user.email "pxl-classroom[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Reset acceptance state for ${{ inputs.github_login }} on ${{ inputs.assignment_id }} (manual retry)"
            git pull --rebase || true
            git push
          else
            echo "No prior acceptance file at $ACCEPT_FILE — proceeding to fresh acceptance."
          fi

      - name: Run acceptance
        id: accept
        uses: ./acceptance
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ inputs.org }}
          control-repo: pxl-classroom-control
          data-dir: control
          assignment-id: ${{ inputs.assignment_id }}
          github-login: ${{ inputs.github_login }}
          github-id: ${{ steps.lookup.outputs.id }}
          workflow-run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - if: steps.accept.outputs.outcome == 'accepted' || steps.accept.outputs.outcome == 'already-accepted'
        uses: ./provisioning
        id: prov
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ inputs.org }}
          template-owner: ${{ steps.accept.outputs.template_owner }}
          template-repo: ${{ steps.accept.outputs.template_repo }}
          target-repo: ${{ steps.accept.outputs.target_repo }}
          student-login: ${{ steps.accept.outputs.github_login }}

      - name: Notify on failure
        if: always() && (steps.accept.outputs.outcome == 'accepted' || steps.accept.outputs.outcome == 'already-accepted') && startsWith(steps.prov.outputs.outcome, 'fail')
        uses: ./notify
        with:
          client-id: ${{ secrets.PXL_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ inputs.org }}
          control-repo: pxl-classroom-control
          event-type: provisioning-failed
          assignment-id: ${{ steps.accept.outputs.assignment_id }}
          details: |
            Manual retry failed to provision repo for `${{ steps.accept.outputs.github_login }}`.
            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          dedup-key: prov-fail-${{ steps.accept.outputs.assignment_id }}-${{ steps.accept.outputs.github_login }}

      - name: Write repository record into control checkout, push
        if: always() && (steps.accept.outputs.outcome == 'accepted' || steps.accept.outputs.outcome == 'already-accepted')
        env:
          ASSIGNMENT_ID: ${{ steps.accept.outputs.assignment_id }}
          LOGIN: ${{ steps.accept.outputs.github_login }}
          OUTCOME: ${{ steps.prov.outputs.outcome }}
        run: |
          set -e
          if [ "$OUTCOME" = "created" ] || [ "$OUTCOME" = "reused" ]; then
            node scripts/write-repository-record.mjs \
              --assignment-id "$ASSIGNMENT_ID" \
              --login "$LOGIN" \
              --org "${{ inputs.org }}" \
              --target-repo "${{ steps.accept.outputs.target_repo }}" \
              --repo-id "${{ steps.prov.outputs.repo-id }}" \
              --repo-url "${{ steps.prov.outputs.repo-url }}" \
              --baseline-sha "${{ steps.prov.outputs.baseline-sha }}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --data-dir control
            git -C control add "repositories/"
          fi

          ACCEPT_FILE="acceptances/${ASSIGNMENT_ID}/${LOGIN}.json"
          if [ -f "control/$ACCEPT_FILE" ]; then
            if [ "$OUTCOME" = "created" ] || [ "$OUTCOME" = "reused" ]; then
              node scripts/update-json-field.mjs "control/$ACCEPT_FILE" "status" "provisioned"
            else
              node scripts/update-json-field.mjs "control/$ACCEPT_FILE" "status" "failed"
            fi
            git -C control add "acceptances/"
          fi

          git -C control config user.name "pxl-classroom[bot]"
          git -C control config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git -C control diff --cached --quiet || git -C control commit -m "Retry-provision ${LOGIN} for ${ASSIGNMENT_ID} (${OUTCOME})"
          scripts/git-push-with-retry.sh control

      - name: Trigger dashboard regeneration
        if: always() && (steps.accept.outputs.outcome == 'accepted' || steps.accept.outputs.outcome == 'already-accepted')
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.0.1
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'regenerate-dashboard.yml', ref: 'main',
              inputs: { org: '${{ inputs.org }}' },
            });
