# Example caller for the reusable provisioning workflow.
# A real deployment would have one caller per assignment (or a matrix over the
# roster) triggered by the acceptance event; this manual one is for validation.

name: Provision (caller example)

on:
  workflow_dispatch:
    inputs:

permissions:
  contents: read

      org:
        required: true
        default: PXLAutomation
      template_owner:
        required: true
        default: PXLAutomation
      template_repo:
        required: true
        default: template-automation-pe-1
      target_repo:
        required: true
      student_login:
        required: true

jobs:
  call:
    uses: ./.github/workflows/provision.yml
    with:
      org: ${{ inputs.org }}
      template_owner: ${{ inputs.template_owner }}
      template_repo: ${{ inputs.template_repo }}
      target_repo: ${{ inputs.target_repo }}
      student_login: ${{ inputs.student_login }}
    secrets:
      app_client_id: ${{ secrets.SPIKE_APP_ID }}
      app_private_key: ${{ secrets.SPIKE_APP_PRIVATE_KEY }}
