name: Collect activity
on:
  schedule:
    - cron: '0 */6 * * *'
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      org: { type: string }
      assignment_id: { type: string }
      collection_type: { type: string, default: scheduled }
jobs:
  find-orgs:
    runs-on: ubuntu-latest
    outputs:
      orgs: ${{ steps.list.outputs.orgs }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: list
        run: |
          if [ -n "${{ inputs.org }}" ]; then
            echo "orgs=[\"${{ inputs.org }}\"]" >> "$GITHUB_OUTPUT"
          else
            git fetch origin participating-orgs:participating-orgs || true
            if git show participating-orgs:participating-orgs.yml > participating-orgs.yml 2>/dev/null; then
              ORGS=$(node -e "
                const {parse} = require('yaml');
                const fs=require('fs');
                const o = parse(fs.readFileSync('participating-orgs.yml','utf8'));
                process.stdout.write(JSON.stringify(o.orgs.map(x => x.login)||[]));
              ")
              echo "orgs=$ORGS" >> "$GITHUB_OUTPUT"
            else
              echo "orgs=[]" >> "$GITHUB_OUTPUT"
            fi
          fi

  collect:
    needs: find-orgs
    if: needs.find-orgs.outputs.orgs != '[]'
    strategy:
      matrix:
        org: ${{ fromJSON(needs.find-orgs.outputs.orgs) }}
      max-parallel: 4
      fail-fast: false
    concurrency:
      group: collect-${{ matrix.org }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: npm ci --omit=dev
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: token
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          owner: ${{ matrix.org }}
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ matrix.org }}/pxl-classroom-control
          token: ${{ steps.token.outputs.token }}
          path: control
      - uses: ./collect
        id: collect_action
        with:
          app-id: ${{ secrets.PXL_APP_ID }}
          app-private-key: ${{ secrets.PXL_APP_PRIVATE_KEY }}
          org: ${{ matrix.org }}
          assignment_id: ${{ inputs.assignment_id || '' }}
          collection_type: ${{ inputs.collection_type || 'scheduled' }}
          data-dir: control
        env:
          CRON_SCHEDULE: ${{ github.event.schedule }}
      - name: Commit + push to control repo
        working-directory: control
        # Only push if we actually collected something
        if: always()
        run: |
          git config user.name "pxl-classroom[bot]"
          git config user.email "pxl-classroom[bot]@users.noreply.github.com"
          git add observations/
          if git diff --cached --quiet; then
            echo "No new observations."
            exit 0
          fi
          git commit -m "Collect activity"
          MAX_RETRIES=5
          RETRY_COUNT=0
          git pull --rebase || true
          until git push; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then exit 1; fi
            sleep $(( (RANDOM % 5) + 2 ))
            git pull --rebase
          done
