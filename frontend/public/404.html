<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PXL Classroom</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script>
  // SPA shim for GitHub Pages.
  // Encodes the path into a single query string, then redirects to the
  // SPA's index.html where a matching decoder rebuilds the route.
  // Adapted from rafgraph/spa-github-pages (MIT).
  var pathSegmentsToKeep = 1; // /pxl-classroom/
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
