name: PXL Classroom Accept
description: >-
  Validate a repository_dispatch acceptance event from a broker, match against
  the roster (or open-accept in v1), check guardrails, and record the
  acceptance. Designed to run in the per-org PRIVATE control repository.

inputs:
  client-id:
    description: GitHub App Client ID (provisioning App)
    required: true
  app-private-key:
    description: GitHub App private key (PEM)
    required: true
  org:
    description: Target organization
    required: true
  control-repo:
    description: Control repository name (this repo)
    required: true
  data-dir:
    description: Root of the control-repo data tree
    required: false
    default: "."
  assignment-id:
    description: Assignment ID. Defaults to repository_dispatch client_payload.
    required: false
    default: ${{ github.event.client_payload.assignment_id }}
  github-login:
    description: Student GitHub login. Defaults to repository_dispatch client_payload.
    required: false
    default: ${{ github.event.client_payload.github_login }}
  github-id:
    description: Student GitHub numeric ID. Defaults to repository_dispatch client_payload.
    required: false
    default: ${{ github.event.client_payload.github_id }}
  workflow-run-url:
    description: URL of the calling workflow run. Defaults to repository_dispatch client_payload.
    required: false
    default: ${{ github.event.client_payload.workflow_run_url }}
  bypass-window:
    description: Bypass assignment time windows (opens_at and deadline_at checks)
    required: false
    default: 'false'

outputs:
  assignment_id:
    description: Validated assignment ID
    value: ${{ steps.accept.outputs.assignment_id }}
  github_login:
    description: Validated student GitHub login
    value: ${{ steps.accept.outputs.github_login }}
  github_id:
    description: Immutable GitHub user ID
    value: ${{ steps.accept.outputs.github_id }}
  outcome:
    description: accepted | already-accepted | rejected:* | fail:*
    value: ${{ steps.accept.outputs.outcome }}
  target_repo:
    description: Deterministic target repository name
    value: ${{ steps.accept.outputs.target_repo }}
  template_owner:
    description: Template repository owner (from the assignment definition)
    value: ${{ steps.accept.outputs.template_owner }}
  template_repo:
    description: Template repository name (from the assignment definition)
    value: ${{ steps.accept.outputs.template_repo }}
  feedback_pr:
    description: Whether to set up a frozen baseline branch for a Feedback PR
    value: ${{ steps.accept.outputs.feedback_pr }}
  feedback_pr_baseline_branch:
    description: Baseline branch name for the Feedback PR
    value: ${{ steps.accept.outputs.feedback_pr_baseline_branch }}

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"

    - name: Install shared dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/..
      run: npm ci --omit=dev

    - name: Validate acceptance
      id: accept
      shell: bash
      env:
        ASSIGNMENT_ID: ${{ inputs.assignment-id }}
        GITHUB_LOGIN: ${{ inputs.github-login }}
        GITHUB_ID: ${{ inputs.github-id }}
        WORKFLOW_RUN_URL: ${{ inputs.workflow-run-url }}
        ORG: ${{ inputs.org }}
        CONTROL_REPO: ${{ inputs.control-repo }}
        DATA_DIR: ${{ inputs.data-dir }}
        BYPASS_WINDOW: ${{ inputs.bypass-window }}
      run: node "$GITHUB_ACTION_PATH/accept.mjs"
